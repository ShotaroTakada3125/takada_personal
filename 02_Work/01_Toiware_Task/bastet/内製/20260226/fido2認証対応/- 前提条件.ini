- 前提条件
    1. XML連携とAPI成功の依存関係
        - 2FAやパスキー設定を行うには、SXI側の「本人確認コード登録済みフラグ（isIdentified）」が true である必要がある
        - 口座開設DBの状態だけで判断（パターンC）した場合、SXI側へのXMLデータ連携が失敗・遅延していると、画面にボタンが表示されていても押下時にAPIエラーが発生してしまう
        - SXI API（getAuthStatus）の結果を利用する（パターンAまたはB）方が、システム的な安全性は高い

    2. 法人口座におけるステータスの扱い
        - 現状、法人は審査完了（Status:5）の段階ではまだ郵送物を受け取っていないため、既存ロジック（Status:6で表示）では2FAカードの表示が行われない
        - SXI統一（パターンB）の場合:
            - XML連携が審査完了（Status:5）に行われ、SXI側の「本人確認コード登録済みフラグ（isIdentified）」が trueになる場合、郵送受け取り前（Status: 5）でもカードが表示されるようになる
            - これが業務要件として許容されるかの確認が必要
        - 口座開設DB統一（パターンC）の場合:
            - 審査完了（Status: 5）では表示されないため、既存の挙動を踏襲することになる。


- 表示条件
    - A. 混合パターン（パスキー：SXI, 2FA：口座開設のパターン）
        - メリット
            - SXI API実行時の整合性が保証される（API失敗リスク低）
            - 2FAの改修が不要（テスト工数減）
        - デメリット
            - 画面内で表示判定基準が混在し、整合性が取れない可能性がある

    - B. SXI統一（パスキー：SXI,2FA：SXIのパターン）
        - メリット
            - 他チャネルとの整合性が取れる
            - API実行時の整合性が保証される
            - 判定ロジックが統一される
        - デメリット
            - 既存の2FAロジックを変更するため、テスト工数が増加する
            - 法人ステータス「5（審査完了・郵送待ち）」での挙動確認が必要（後述）

    - C. 口座開設DB統一（パスキー：口座開設,2FA：口座開設のパターン）
        - メリット
            - 既存の2FAロジックを維持できるため、テスト工数が最小
        - デメリット
            - XML連携失敗時のリスク大：口座開設側がOKでもSXI側への連携が失敗していると、パスキー等のAPIがエラーになる
            - 法人ステータス「5」でパスキーが表示されなくなる（既存バグの踏襲となるか要検討）


確認事項
1. XML連携タイミングの調査（コード調査）
    - signup-backoffice のコードを確認し、SXI側へ「本人確認済み」として連携される正確なタイミングを特定する
    - 特に法人の場合、「審査完了（Status: 5）」時か、「郵送受取（Status: 6）」時か、両方で連携が走るかを確認する
2. SXI側仕様の確認
    - XML連携完了と同時に isIdentified が true になるか、SXI担当者へ再確認する
        - registerの時なのか、updateの時なのか
        - 個人の場合は5ではなく6

確認事項のパターン別考慮
- ~~法人のXML連携タイミングが「Status 6（郵送受取）」だった場合 → パターンB~~
- 法人のXML連携タイミングが「Status 5（審査完了）」だった場合
    - Status5でも設定できて良いならパターンB
    - 郵送完了まで設定させたくないならパターンA or パターンBに口座開設ステータスの条件を追加
        → これが最も安全
- XML連携とSXI反映にタイムラグがあると判明した場合 → パターンA or B

5と6の両方でxml連携している場合は、xml連携の種類のうちregisterとupdateがあり、どちらの時に、「本人確認済み」がtrueに変更されるのかが不明
    → SXIに確認

ステータス番号ではなく、名称で連携すること
現行2面で本審査の承認前と承認後の本人確認コード登録済みフラグをYuinchiで確認
    - 目的：XML連携完了と同時に isIdentified が true になるか
    - 可能かどうか松岡さんに確認する
    → 個人と法人の両方で本人確認コード登録済みフラグを確認する
    - 個人
        承認前：2 → 承認後：6
    - 法人
        承認前：2 → 承認後：5
    - 上記の結果
        - 個人/法人の両方で本人確認コード登録済みフラグがtrueになっている場合は、XML連携完了と同時に isIdentified が true になる
        - 法人で本人確認コード登録済みフラグがtrueになっていない場合は、郵送受け取り済みになったあとにXML連携を行っている
        - 郵送受け取り済みになったタイミングでisIdentifiedがtrueになっているか確認
        - 法人でisIdentifiedがtrueになるタイミングは5なのか、6なのか、どちらでもないのか
    - 結論
        - 法人の場合、承認前/承認後/郵送受け取り済みの本人確認コード登録済みフラグを確認し、どのタイミングでisIdentified が true になっているかを確認する
            - 承認後でtrueになる場合：承認後にtrueになるため、郵送受け取り済みではないのに本人確認コード登録済みになる → 両方のステータスを確認する必要あり
            - 郵送後にtrueになる場合：郵送受け取り済みと、本人確認コード登録済みフラグは同時に変化 → これならSXIでも口座開設でもOK
        - 個人の場合、承認後 = 郵送受け取り済みなので、承認後にisIdentified が true になっているかを確認する
        - 2FAの表示は、口座開設側のDBを使用しているが、これはXML連携の失敗(本人確認コード登録済みフラグがfalseのまま)のとき、APIエラーが起きる既存バグがある



